<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tape Zone🎵</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:  #ff4d6d;
      --rose:  #c2185b;
      --blush: #fce4ec;
      --dark:  #2a1520;
      --mono:  'DM Mono', monospace;
      --serif: 'Playfair Display', serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      font-family: var(--mono);
      background: linear-gradient(135deg, #fce4ec 0%, #f48ca6 50%, #e91e63 100%);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 60px 24px 80px;
      position: relative;
    }

    /* ── BACKGROUND ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .bg-canvas::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(255,182,193,0.7) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(255,105,135,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, rgba(255,228,230,0.6) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 80%, rgba(255,150,170,0.4) 0%, transparent 45%),
        linear-gradient(135deg, #fce4ec 0%, #f48ca6 50%, #e91e63 100%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(10deg) brightness(1.05); }
    }
    .bg-canvas::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.55;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* floating music notes */
    .note {
      position: fixed; pointer-events: none; z-index: 1;
      opacity: 0; animation: floatNote linear infinite;
      color: rgba(180,0,60,0.5);
    }
    @keyframes floatNote {
      0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.4; }
      100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; }
    }

    /* background ring pulses */
    .ring-bg {
      position: fixed; border-radius: 50%;
      border: 1px solid rgba(255,77,109,0.12);
      pointer-events: none; z-index: 0;
      animation: ringExpand linear infinite;
    }
    @keyframes ringExpand {
      0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
    }

    /* ── PAGE TITLE ── */
    .page-title {
      position: relative; z-index: 2; text-align: center;
    }
    .page-title h1 {
      font-family: var(--serif);
      font-size: 38px; color: #7b1535;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 16px rgba(180,0,60,0.2);
    }
    .page-title p {
      font-size: 12px; color: rgba(180,0,60,0.45);
      letter-spacing: 3px; text-transform: uppercase; margin-top: 6px;
    }

    /* ── TAPE ROW WRAPPER (cassette + side panels) ── */
    .tape-wrap {
      position: relative; z-index: 2;
      width: 100%; max-width: 860px;
      display: flex; align-items: center; gap: 0;
      transition: transform 0.3s ease;
    }
    .tape-wrap:hover { transform: translateY(-3px); }

    /* ── SIDE PANELS ── */
    .side-panel {
      width: 110px;
      height: 110px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,220,230,0.55);
      border: 1px solid rgba(255,100,140,0.2);
      transition: all 0.4s ease;
      backdrop-filter: blur(6px);
    }
    .tape-wrap.playing .side-panel {
      background: rgba(255,200,215,0.75);
      border-color: rgba(255,77,109,0.5);
      box-shadow: 0 0 24px rgba(255,77,109,0.25);
    }
    .side-panel.left  { border-radius: 14px 0 0 14px; }
    .side-panel.right { border-radius: 0 14px 14px 0; }

    /* waveform canvas inside side panel */
    .wave-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* idle state: soft static bars */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 60px;
      width: 80%;
      position: relative;
      z-index: 1;
    }
    .eq-bar {
      width: 5px;
      border-radius: 3px 3px 0 0;
      background: rgba(255,120,150,0.2);
      transition: height 0.1s ease, background 0.3s ease;
      min-height: 4px;
    }

    /* playing: each bar animates independently */
    .tape-wrap.playing .eq-bar {
      background: linear-gradient(to top, var(--bar-bot, #ff4d6d), var(--bar-top, #ff9a9e));
      animation: eqBounce var(--spd, 0.5s) ease-in-out infinite alternate;
      box-shadow: 0 0 6px rgba(255,77,109,0.5);
    }
    @keyframes eqBounce {
      from { height: var(--min-h, 6px); }
      to   { height: var(--max-h, 50px); }
    }

    /* heart pulse icon center of side panel when playing */
    .side-heart {
      position: absolute;
      font-size: 22px;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 2;
      pointer-events: none;
      animation: none;
    }
    .tape-wrap.playing .side-heart {
      opacity: 0.55;
      animation: heartBeat 0.8s ease-in-out infinite;
    }
    @keyframes heartBeat {
      0%,100% { transform: scale(1); }
      30%      { transform: scale(1.25); }
      60%      { transform: scale(0.95); }
    }

    /* particle burst spots */
    .spark {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--pink);
      pointer-events: none;
      opacity: 0;
      z-index: 3;
    }
    .tape-wrap.playing .spark {
      animation: sparkFly var(--sd, 1.2s) ease-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes sparkFly {
      0%   { transform: translate(0,0) scale(1); opacity: 0.9; }
      100% { transform: translate(var(--tx,20px), var(--ty,-30px)) scale(0); opacity: 0; }
    }

    /* side label */
    .side-label {
      position: absolute;
      bottom: 7px;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(200,50,80,0.3);
      font-family: var(--mono);
      transition: color 0.4s;
      z-index: 2;
    }
    .tape-wrap.playing .side-label { color: rgba(255,77,109,0.6); }

    /* ── CASSETTE BODY ── */
    .cassette {
      flex: 1;
      border-radius: 0;
      padding: 20px 24px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow:
        0 4px 0 rgba(180,30,60,0.25),
        0 20px 50px rgba(180,30,60,0.18),
        inset 0 1px 0 rgba(255,255,255,0.4);
      transition: box-shadow 0.4s ease;
      overflow: hidden;
    }
    .tape-1 .cassette { background: linear-gradient(135deg, #ffd6e0, #ffb3c6, #ffd6e0); }
    .tape-2 .cassette { background: linear-gradient(135deg, #ffe0b2, #ffcc80, #ffe0b2); }
    .tape-3 .cassette { background: linear-gradient(135deg, #e1bee7, #ce93d8, #e1bee7); }

    .tape-wrap.playing .cassette {
      box-shadow:
        0 4px 0 rgba(180,30,60,0.25),
        0 0 0 2px var(--pink),
        0 0 40px rgba(255,77,109,0.35),
        0 20px 60px rgba(180,30,60,0.2);
    }
    .cassette::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
      transform: translateX(-100%); pointer-events: none; border-radius: 0;
    }
    .tape-wrap.playing .cassette::after { animation: shimmerSweep 2.5s linear infinite; }
    @keyframes shimmerSweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    .cassette::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 8px);
      pointer-events: none;
    }

    /* ── REELS ── */
    .reel-pair { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .reel {
      width: 62px; height: 62px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), transparent 60%), #c2185b;
      border: 3px solid rgba(0,0,0,0.35);
      position: relative; display: flex; align-items: center; justify-content: center;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
    }
    .reel::before {
      content: ''; position: absolute; inset: 8px; border-radius: 50%;
      background: conic-gradient(
        rgba(255,255,255,0.15) 0deg, transparent 60deg,
        rgba(255,255,255,0.15) 120deg, transparent 180deg,
        rgba(255,255,255,0.15) 240deg, transparent 300deg,
        rgba(255,255,255,0.15) 360deg
      );
    }
    .reel-hub {
      width: 16px; height: 16px;
      background: radial-gradient(circle, #555, #222);
      border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
      position: relative; z-index: 1;
    }
    .tape-wrap.playing .reel { animation: reelSpin 1.8s linear infinite; }
    @keyframes reelSpin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    .reel-ribbon {
      width: 24px; height: 6px; background: rgba(0,0,0,0.35);
      border-radius: 3px; position: relative; overflow: hidden;
    }
    .reel-ribbon::after {
      content: ''; position: absolute; inset: 2px;
      background: rgba(255,255,255,0.1); border-radius: 2px;
    }

    /* ── TAPE INFO ── */
    .tape-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
    .song-title {
      font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--dark);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-sub { font-size: 11px; color: rgba(42,21,32,0.6); font-style: italic; letter-spacing: 0.5px; }
    .lcd {
      background: rgba(0,0,0,0.18); border-radius: 6px; padding: 4px 10px;
      font-size: 10px; font-family: var(--mono); color: rgba(42,21,32,0.55);
      letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .lcd-dot {
      width: 5px; height: 5px; border-radius: 50%; background: rgba(42,21,32,0.2);
    }
    .tape-wrap.playing .lcd-dot {
      background: var(--pink); box-shadow: 0 0 6px var(--pink);
      animation: ledBlink 1s ease-in-out infinite;
    }
    @keyframes ledBlink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .progress-wrap {
      width: 100%; height: 4px; background: rgba(0,0,0,0.15);
      border-radius: 4px; overflow: hidden; margin-top: 4px; cursor: pointer;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--pink), var(--rose));
      border-radius: 4px; transition: width 0.3s linear;
    }
    .tape-wrap.playing .progress-fill {
      animation: progressGrow var(--duration, 180s) linear forwards;
    }
    @keyframes progressGrow { from{width:0%;} to{width:100%;} }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: 10px; color: rgba(42,21,32,0.5); font-family: var(--mono);
    }

    /* ── PLAY BUTTON ── */
    .play-btn {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: var(--pink); color: white; font-size: 18px; cursor: pointer;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255,77,109,0.4), 0 2px 0 rgba(0,0,0,0.2);
      transition: all 0.2s ease; position: relative; z-index: 2;
    }
    .play-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(255,77,109,0.6); }
    .play-btn:active { transform: scale(0.95); }
    .tape-wrap.playing .play-btn {
      background: var(--rose);
      animation: btnPulse 1.8s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%,100% { box-shadow: 0 4px 16px rgba(194,24,91,0.4), 0 0 0 0 rgba(194,24,91,0.3); }
      50%      { box-shadow: 0 4px 16px rgba(194,24,91,0.6), 0 0 0 10px rgba(194,24,91,0); }
    }

    /* corner screws */
    .screw {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4), rgba(0,0,0,0.4));
      border: 1px solid rgba(0,0,0,0.2);
    }
    .screw-tl{top:10px;left:10px;} .screw-tr{top:10px;right:10px;}
    .screw-bl{bottom:10px;left:10px;} .screw-br{bottom:10px;right:10px;}

    .label-sticker {
      position: absolute; top: 8px; right: 70px;
      font-size: 9px; font-family: var(--mono); color: rgba(42,21,32,0.4);
      letter-spacing: 1px; text-transform: uppercase;
      writing-mode: vertical-rl; opacity: 0.6;
    }

    /* entrance */
    .tape-wrap { animation: tapeIn 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    .tape-wrap:nth-child(2){animation-delay:0.1s;}
    .tape-wrap:nth-child(3){animation-delay:0.2s;}
    .tape-wrap:nth-child(4){animation-delay:0.3s;}
    @keyframes tapeIn {
      from{opacity:0;transform:translateY(40px) scale(0.95);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }

    audio { display: none; }
    /* ── NEXT PAGE BUTTON ── */
    .next-wrap {
      position: relative; z-index: 2;
      text-align: center;
      margin-top: 10px;
    }
    .next-btn {
      padding: 14px 44px;
      background: transparent;
      color: #fce4ec;
      border: 2px solid rgba(255,77,109,0.5);
      border-radius: 50px;
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255,77,109,0.1);
    }
    .next-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #ff4d6d, #c2185b);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 0;
    }
    .next-btn:hover { border-color: #ff4d6d; box-shadow: 0 0 30px rgba(255,77,109,0.4), 0 0 60px rgba(255,77,109,0.15); transform: translateY(-3px); }
    .next-btn:hover::before { opacity: 1; }
    .next-btn:active { transform: scale(0.97); }
    .next-btn span { position: relative; z-index: 1; }


    /* ══ CHARACTERS — bobblehead caricature style ══ */

    /* wrapper sits at bottom of screen, fixed */
    .character {
      position: fixed;
      bottom: 0;
      z-index: 5;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 160px;
    }

    .character.boy  { left: 10px; }
    .character.girl { right: 10px; }

    /* bobbing + leaning animations */
    .character.boy {
      animation: boyBob 3.2s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .character.girl {
      animation: girlBob 3.2s ease-in-out infinite 1.4s;
      transform-origin: bottom center;
    }

    @keyframes boyBob {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      25%      { transform: translateY(-10px) rotate(3deg); }
      75%      { transform: translateY(-6px) rotate(-2deg); }
    }
    @keyframes girlBob {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      25%      { transform: translateY(-10px) rotate(-3deg); }
      75%      { transform: translateY(-6px) rotate(2deg); }
    }

    /* ── the whole character stack: big head on top, small body below ── */
    .char-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* BODY SVG — small, sits below head */
    .char-body { width: 100px; display: block; flex-shrink: 0; }

    /* BIG HEAD — photo fills entire oversized circle, no SVG head at all */
    .char-head {
      width: 130px;       /* big — ~40% of total character visual */
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      z-index: 2;
      margin-bottom: -18px; /* overlaps the neck/shoulders of body */
      flex-shrink: 0;
      /* shadow under the big head like the reference */
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.28));
    }
    .char-head img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      border-radius: 50%;
    }

    /* neck connector */
    .char-neck {
      width: 22px;
      height: 16px;
      background: #FFCC80;
      border-radius: 0 0 6px 6px;
      position: relative;
      z-index: 1;
      margin-bottom: -2px;
    }

    /* ground shadow like reference image */
    .char-shadow {
      width: 90px;
      height: 16px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.18) 0%, transparent 75%);
      margin-top: 0px;
      border-radius: 50%;
    }

    /* ── flying kisses ── */
    .kiss-fly {
      position: fixed;
      font-size: 22px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
    }
    .kiss-fly.from-boy  { left: 150px; bottom: 320px; animation: flyRight 3s ease-in-out infinite; }
    .kiss-fly.from-boy.d2 { animation-delay: 1.5s; font-size: 15px; }
    .kiss-fly.from-girl { right: 150px; bottom: 320px; animation: flyLeft  3s ease-in-out infinite 1.8s; }
    .kiss-fly.from-girl.d2 { animation-delay: 3.3s; font-size: 15px; }

    @keyframes flyRight {
      0%   { opacity:0; transform:translate(0,0) scale(0.4); }
      15%  { opacity:1; }
      85%  { opacity:0.8; }
      100% { opacity:0; transform:translate(230px,-80px) scale(1.4); }
    }
    @keyframes flyLeft {
      0%   { opacity:0; transform:translate(0,0) scale(0.4); }
      15%  { opacity:1; }
      85%  { opacity:0.8; }
      100% { opacity:0; transform:translate(-230px,-80px) scale(1.4); }
    }

    /* ── heart pops ── */
    .heart-pop {
      position: fixed;
      font-size: 18px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      animation: popUp 2.4s ease-out infinite;
    }
    @keyframes popUp {
      0%   { opacity:0; transform:translate(0,0) scale(0.3); }
      18%  { opacity:1; }
      100% { opacity:0; transform:translate(var(--dx,0px),-100px) scale(1.1); }
    }

    /* ── speech bubbles ── */
    .bubble {
      position: fixed;
      background: white;
      border-radius: 16px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #e91e63;
      box-shadow: 0 4px 16px rgba(0,0,0,0.13);
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      animation: bubbleShow 5.5s ease-in-out infinite;
    }
    .bubble::after {
      content:''; position:absolute; bottom:-9px;
      width:0; height:0;
      border-left:8px solid transparent;
      border-right:8px solid transparent;
      border-top:10px solid white;
    }
    .bubble.boy-b  { left:10px;  bottom:400px; animation-delay:0.8s; }
    .bubble.boy-b::after  { left:28px; }
    .bubble.girl-b { right:10px; bottom:400px; animation-delay:3.2s; }
    .bubble.girl-b::after { right:28px; }
    @keyframes bubbleShow {
      0%,10%   { opacity:0; transform:scale(0.6) translateY(10px); }
      20%,60%  { opacity:1; transform:scale(1) translateY(0);      }
      75%,100% { opacity:0; transform:scale(0.8) translateY(-6px); }
    }

  </style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="page-title">
  <h1>Begum ki khidmat ke kuch shayari 🙈</h1>
  <p>Irshaad Farmaaaye 🎵</p>
</div>

<!-- helper: build a side panel -->
<!-- TAPE 1 -->
<div class="tape-wrap tape-1" id="tape-0">

  <div class="side-panel left" id="side-0-L">
    <canvas class="wave-canvas" id="waveL-0"></canvas>
    <div class="eq-bars" id="eqL-0"></div>
    <div class="side-heart">💗</div>
    <div class="side-label">FREQ</div>
  </div>

  <div class="cassette">
    <div class="screw screw-tl"></div><div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div><div class="screw screw-br"></div>
    <div class="label-sticker">SIDE A · 2024</div>
    <div class="reel-pair">
      <div class="reel"><div class="reel-hub"></div></div>
      <div class="reel-ribbon"></div>
      <div class="reel"><div class="reel-hub"></div></div>

<script>
  var currentPlaying = -1;
  var timers = [null, null, null];
  var eqTimers = [null, null, null];

  // tape accent colors
  var tapeColors = [
    { bot: '#ff4d6d', top: '#ff9a9e', glow: 'rgba(255,77,109,0.7)' },
    { bot: '#ff9800', top: '#ffcc02', glow: 'rgba(255,152,0,0.7)'  },
    { bot: '#ab47bc', top: '#e1bee7', glow: 'rgba(171,71,188,0.7)' },
  ];

  function fmt(s) {
    s = Math.floor(s || 0);
    return Math.floor(s/60) + ':' + ('0'+s%60).slice(-2);
  }

  // ── BUILD EQ BARS ──
  var BAR_COUNT = 10;
  [0,1,2].forEach(function(i) {
    ['L','R'].forEach(function(side) {
      var container = document.getElementById('eq'+side+'-'+i);
      var c = tapeColors[i];
      for (var b = 0; b < BAR_COUNT; b++) {
        var bar = document.createElement('div');
        bar.className = 'eq-bar';
        bar.style.setProperty('--bar-bot', c.bot);
        bar.style.setProperty('--bar-top', c.top);
        var minH = 4 + Math.random() * 6;
        var maxH = 20 + Math.random() * 45;
        var spd  = 0.3 + Math.random() * 0.6;
        bar.style.setProperty('--min-h', minH + 'px');
        bar.style.setProperty('--max-h', maxH + 'px');
        bar.style.setProperty('--spd', spd + 's');
        bar.style.animationDelay = (Math.random() * 0.5) + 's';
        bar.style.height = minH + 'px';
        container.appendChild(bar);
      }
    });
  });

  // ── SIMULATE EQ when no real audio data ──
  function startEqSim(i) {
    var c = tapeColors[i];
    eqTimers[i] = setInterval(function() {
      ['L','R'].forEach(function(side) {
        var bars = document.querySelectorAll('#eq'+side+'-'+i+' .eq-bar');
        bars.forEach(function(bar) {
          var h = 8 + Math.random() * 52;
          bar.style.height = h + 'px';
          // canvas waveform sim
        });
      });
      // update canvas waveform
      drawWaveSim(i);
    }, 80);
  }

  function stopEqSim(i) {
    clearInterval(eqTimers[i]);
    // reset bars
    ['L','R'].forEach(function(side) {
      var bars = document.querySelectorAll('#eq'+side+'-'+i+' .eq-bar');
      bars.forEach(function(bar) { bar.style.height = '4px'; });
    });
    // clear canvases
    ['L','R'].forEach(function(side) {
      var canvas = document.getElementById('wave'+side+'-'+i);
      if (canvas) {
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height);
      }
    });
  }

  // ── CANVAS WAVEFORM SIMULATION ──
  var wavePhases = [0, 0, 0];
  function drawWaveSim(i) {
    var c = tapeColors[i];
    wavePhases[i] += 0.18;
    ['L','R'].forEach(function(side, sideIdx) {
      var canvas = document.getElementById('wave'+side+'-'+i);
      if (!canvas) return;
      canvas.width  = canvas.offsetWidth  || 110;
      canvas.height = canvas.offsetHeight || 110;
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);

      var W = canvas.width, H = canvas.height;
      var midY = H / 2;
      var phase = wavePhases[i] + (sideIdx * Math.PI * 0.5);

      // glow gradient
      var grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0,   c.top + 'aa');
      grad.addColorStop(0.5, c.bot + 'ff');
      grad.addColorStop(1,   c.top + 'aa');

      // draw multiple wave layers
      for (var layer = 0; layer < 3; layer++) {
        ctx.beginPath();
        ctx.moveTo(0, midY);
        var amp   = (14 - layer*3) + Math.sin(Date.now()*0.003 + layer) * 8;
        var freq  = 2 + layer * 0.7;
        var alpha = 0.6 - layer * 0.15;
        ctx.strokeStyle = layer === 0 ? c.bot : 'rgba(255,255,255,' + alpha*0.4 + ')';
        ctx.lineWidth   = layer === 0 ? 2.5 : 1;
        ctx.shadowBlur  = layer === 0 ? 8 : 0;
        ctx.shadowColor = c.glow;
        for (var x = 0; x <= W; x += 2) {
          var y = midY + Math.sin((x / W) * Math.PI * 2 * freq + phase + layer) * amp
                       + Math.sin((x / W) * Math.PI * 3 + phase * 1.3) * (amp * 0.4);
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // circle orbs that pulse
      var orbCount = 3;
      for (var o = 0; o < orbCount; o++) {
        var ox = (W / (orbCount+1)) * (o+1);
        var oy = midY + Math.sin(phase + o * 2.1) * 18;
        var r  = 3 + Math.abs(Math.sin(phase * 1.5 + o)) * 5;
        var orbGrad = ctx.createRadialGradient(ox, oy, 0, ox, oy, r * 2);
        orbGrad.addColorStop(0, c.bot + 'cc');
        orbGrad.addColorStop(1, c.bot + '00');
        ctx.beginPath();
        ctx.arc(ox, oy, r, 0, Math.PI * 2);
        ctx.fillStyle = orbGrad;
        ctx.fill();
      }
    });
  }

  // ── TOGGLE PLAY ──
  function togglePlay(i) {
    var audio = document.getElementById('audio-' + i);
    var tape  = document.getElementById('tape-' + i);
    var btn   = document.getElementById('btn-' + i);
    var stat  = document.getElementById('status-' + i);
    var pf    = document.getElementById('pf-' + i);

    if (currentPlaying !== -1 && currentPlaying !== i) stopTape(currentPlaying);

    if (tape.classList.contains('playing')) {
      audio.pause();
      tape.classList.remove('playing');
      btn.textContent = '▶';
      stat.textContent = 'PAUSED';
      clearInterval(timers[i]);
      stopEqSim(i);
      currentPlaying = -1;
    } else {
      audio.play().catch(function(){});
      tape.classList.add('playing');
      btn.textContent = '❚❚';
      stat.textContent = 'PLAYING';
      currentPlaying = i;

      pf.style.animation = 'none';
      pf.offsetHeight;
      var dur = audio.duration || 180;
      tape.style.setProperty('--duration', dur + 's');
      pf.style.animation = '';

      clearInterval(timers[i]);
      timers[i] = setInterval(function() {
        document.getElementById('cur-'+i).textContent = fmt(audio.currentTime);
        document.getElementById('dur-'+i).textContent = fmt(audio.duration);
      }, 500);

      startEqSim(i);

      audio.addEventListener('ended', function(){ stopTape(i); }, {once:true});
    }
  }

  function stopTape(i) {
    var audio = document.getElementById('audio-'+i);
    var tape  = document.getElementById('tape-'+i);
    var pf    = document.getElementById('pf-'+i);
    audio.pause();
    audio.currentTime = 0;
    tape.classList.remove('playing');
    document.getElementById('btn-'+i).textContent = '▶';
    document.getElementById('status-'+i).textContent = 'READY';
    pf.style.animation = 'none';
    pf.style.width = '0%';
    clearInterval(timers[i]);
    stopEqSim(i);
    if (currentPlaying === i) currentPlaying = -1;
  }

  // ── PROGRESS SEEK ──
  [0,1,2].forEach(function(i) {
    document.getElementById('pw-'+i).addEventListener('click', function(e) {
      var audio = document.getElementById('audio-'+i);
      if (!audio.duration) return;
      var rect = this.getBoundingClientRect();
      var pct  = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
      document.getElementById('pf-'+i).style.width = (pct*100)+'%';
    });
  });

  // ── FLOATING NOTES ──
  (function(){
    var notes = ['♩','♪','♫','♬'];
    function spawn(){
      var n = document.createElement('div');
      n.className = 'note';
      n.textContent = notes[Math.floor(Math.random()*notes.length)];
      n.style.left = (Math.random()*100)+'vw';
      n.style.bottom = '-30px';
      var dur = 6+Math.random()*8;
      n.style.animationDuration = dur+'s';
      n.style.animationDelay = (Math.random()*3)+'s';
      n.style.fontSize = (14+Math.random()*18)+'px';
      document.body.appendChild(n);
      setTimeout(function(){ n.remove(); spawn(); }, (dur+3)*1000);
    }
    for(var i=0;i<12;i++) setTimeout(spawn, Math.random()*6000);
  })();

  // ── BG RINGS ──
  (function(){
    [{left:'20%',top:'30%'},{left:'75%',top:'60%'},{left:'50%',top:'80%'}].forEach(function(pos,idx){
      var r = document.createElement('div');
      r.className = 'ring-bg';
      r.style.cssText = 'width:300px;height:300px;left:'+pos.left+';top:'+pos.top+';animation-duration:'+(8+idx*3)+'s;animation-delay:-'+(idx*3)+'s;';
      document.querySelector('.bg-canvas').appendChild(r);
    });
  })();

</script>
