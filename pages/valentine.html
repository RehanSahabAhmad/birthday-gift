<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/valentine.css" />
    <title>Sadiya Do you love me?</title>
  </head>
  <body>

    <!-- Question screen -->
    <div class="question-container container">
      <video class="local-gif" src="../assets/videos/Reply me love.mp4" autoplay muted loop></video>
      <h5 class="question">Do you like my virtual gift??</h5>
      <div class="button-container">
        <button class="yes-btn btn js-yes-btn">Yes</button>
        <button class="no-btn btn js-no-btn">No</button>
      </div>
    </div>

    <!-- Result screen -->
    <div class="result-container container">
      <video class="gif-result" src="../assets/videos/Love me.mp4" autoplay loop></video>
      <h3 class="iknow">I knew it 😍</h3>
      <button class="proceed-btn" onclick="window.location.href='envelope.html'">🔄 Start Again</button>
    </div>

    <!-- Heart loader -->
    <div class="cssload-main">
      <div class="cssload-heart">
        <span class="cssload-heartL"></span>
        <span class="cssload-heartR"></span>
        <span class="cssload-square"></span>
      </div>
      <div class="cssload-shadow"></div>
    </div>

    <script src="../js/valentine.js"></script>
  </body>
</html>
