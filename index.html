<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wait...</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      font-family: 'Nunito', sans-serif;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(255,182,193,0.75) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(255,105,135,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, rgba(255,228,230,0.65) 0%, transparent 45%),
        linear-gradient(135deg, #fce4ec 0%, #f48ca6 50%, #e91e63 100%);
    }

    /* noise */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      background-size:180px; opacity:.55; mix-blend-mode:overlay;
    }
    /* shimmer lines */
    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background: repeating-linear-gradient(-45deg,
        rgba(255,255,255,.04) 0px, rgba(255,255,255,.04) 1px,
        transparent 1px, transparent 10px);
    }

    /* bokeh blobs */
    .bk { position:fixed; border-radius:50%; pointer-events:none; z-index:0;
      filter:blur(40px); animation:bkf ease-in-out infinite alternate; }
    @keyframes bkf { from{transform:translateY(0);} to{transform:translateY(-28px);} }

    /* petals */
    .pt { position:fixed; pointer-events:none; z-index:1; animation:ptf linear forwards; }
    @keyframes ptf {
      0%   { transform:translateY(-40px) rotate(0deg); opacity:0; }
      8%   { opacity:.7; }
      92%  { opacity:.4; }
      100% { transform:translateY(105vh) rotate(540deg); opacity:0; }
    }

    /* ══════════════════════════════
       PASSWORD SCREEN
    ══════════════════════════════ */
    #password-screen {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 22px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 32px;
      padding: 44px 48px 40px;
      box-shadow: 0 24px 64px rgba(180,0,80,0.22), 0 0 0 1px rgba(255,255,255,0.4);
      animation: popIn .5s cubic-bezier(.16,1,.3,1);
      max-width: 420px; width: 90%;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.85) translateY(20px); }
      to   { opacity:1; transform:scale(1)   translateY(0); }
    }

    .lock-icon {
      font-size: 52px;
      animation: wobble 3s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes wobble {
      0%,100% { transform:rotate(0deg) scale(1); }
      20%      { transform:rotate(-8deg) scale(1.08); }
      40%      { transform:rotate(8deg) scale(1.08); }
      60%      { transform:rotate(-4deg) scale(1.04); }
      80%      { transform:rotate(4deg) scale(1.04); }
    }

    .pw-title {
      font-size: 24px; font-weight: 800;
      color: #880e4f;
      text-align: center; line-height: 1.3;
    }
    .pw-sub {
      font-size: 13px; color: #c2185b; font-weight: 600;
      text-align: center; margin-top: -10px; letter-spacing: .3px;
    }

    /* input wrapper */
    .pw-input-wrap {
      position: relative; width: 100%;
    }
    #pw-input {
      width: 100%;
      padding: 14px 50px 14px 20px;
      border: 2.5px solid rgba(255,160,185,.5);
      border-radius: 50px;
      font-size: 18px; font-family: 'Nunito', sans-serif;
      font-weight: 700; color: #7b1535;
      background: rgba(255,240,245,.8);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      letter-spacing: 4px; text-align: center;
    }
    #pw-input:focus {
      border-color: #ff4d6d;
      box-shadow: 0 0 0 4px rgba(255,77,109,.15);
      background: #fff;
    }
    #pw-input.error {
      border-color: #e53935;
      box-shadow: 0 0 0 4px rgba(229,57,53,.15);
      animation: shake .4s ease;
    }
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      20%      { transform:translateX(-10px); }
      40%      { transform:translateX(10px); }
      60%      { transform:translateX(-7px); }
      80%      { transform:translateX(7px); }
    }

    /* eye toggle */
    #eye-btn {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 20px; line-height: 1; padding: 4px;
      color: #c2185b; transition: transform .2s;
    }
    #eye-btn:hover { transform: translateY(-50%) scale(1.2); }

    /* submit button */
    #submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff4d6d, #c2185b);
      color: white; border: none; border-radius: 50px;
      font-size: 17px; font-family: 'Nunito', sans-serif; font-weight: 800;
      cursor: pointer; letter-spacing: .5px;
      box-shadow: 0 8px 24px rgba(194,24,91,.38), 0 3px 0 #880e4f;
      transition: all .22s ease;
    }
    #submit-btn:hover  { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 32px rgba(194,24,91,.5); }
    #submit-btn:active { transform: scale(.97); }

    /* error message */
    #error-msg {
      font-size: 13px; font-weight: 700;
      color: #e53935; text-align: center;
      min-height: 18px; margin-top: -8px;
      transition: opacity .2s;
    }

    /* hint dots */
    .hint-dots {
      display: flex; gap: 8px; justify-content: center; margin-top: -4px;
    }
    .hint-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,77,109,.25);
      transition: background .2s, transform .2s;
    }
    .hint-dot.filled { background: #ff4d6d; transform: scale(1.3); }

    /* ══════════════════════════════
       INTRO / ANIMATION SCREEN
    ══════════════════════════════ */
    #intro-screen {
      display: none;
      position: fixed; inset: 0; z-index: 20;
      /* same bg as body */
    }

    .plane {
      width: 180px;
      position: absolute;
      top: 40%;
      left: -200px;
      animation: fly 6s ease-in-out forwards;
      filter: drop-shadow(0 8px 20px rgba(180,0,80,.25));
    }
    @keyframes fly {
      0%   { left: -200px; }
      100% { left: 110%; }
    }

    #typewriter {
      position: absolute;
      top: 65%;
      width: 100%;
      text-align: center;
      font-size: 1.4rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: #c2185b;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(180,0,80,.15);
    }

    /* success burst */
    .success-ring {
      position: fixed; inset: 0; z-index: 15; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .ring {
      width: 0; height: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.7) 0%, rgba(255,77,109,.3) 60%, transparent 70%);
      animation: ringBurst .6s ease-out forwards;
    }
    @keyframes ringBurst {
      from { width:0; height:0; opacity:1; }
      to   { width:600px; height:600px; opacity:0; }
    }
  </style>
</head>
<body>

  <!-- ══ BOKEH + PETALS (js injected) ══ -->

  <!-- ══ PASSWORD SCREEN ══ -->
  <div id="password-screen">

    <div class="lock-icon">🔐</div>

    <div>
      <p class="pw-title">Sirf Tumhare Liye 💕</p>
    </div>
    <p class="pw-sub">Enter the secret password to open your gift 🎁</p>

    <div class="hint-dots" id="hint-dots">
      <!-- filled by JS based on input length -->
    </div>

    <div class="pw-input-wrap">
      <input
        id="pw-input"
        type="password"
        placeholder="password..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        maxlength="30"
      />
      <button id="eye-btn" type="button" onclick="toggleEye()" title="Show/hide">👁️</button>
    </div>

    <div id="error-msg"></div>

    <button id="submit-btn" onclick="checkPassword()">Open My Gift 💖</button>

  </div>

  <!-- ══ INTRO ANIMATION SCREEN ══ -->
  <div id="intro-screen">
    <img
      src="assets/images/hello-kitty-plane.png"
      alt="plane"
      class="plane"
    />
    <p id="typewriter"></p>
  </div>

  <script>
    // ════════════════════════════════════════
    //  SET YOUR PASSWORD HERE ↓
    // ════════════════════════════════════════
    const SECRET_PASSWORD = "mybegum";   // ← change this

    // ════════════════════════════════════════
    //  PASSWORD LOGIC
    // ════════════════════════════════════════
    const input    = document.getElementById('pw-input');
    const errorMsg = document.getElementById('error-msg');
    const hintDots = document.getElementById('hint-dots');

    // Build hint dots (shows how many chars typed, not what)
    const DOT_COUNT = 6;
    for (let i = 0; i < DOT_COUNT; i++) {
      const d = document.createElement('div');
      d.className = 'hint-dot';
      d.id = `dot-${i}`;
      hintDots.appendChild(d);
    }

    input.addEventListener('input', () => {
      const len = Math.min(input.value.length, DOT_COUNT);
      for (let i = 0; i < DOT_COUNT; i++) {
        document.getElementById(`dot-${i}`).classList.toggle('filled', i < len);
      }
      // clear error on typing
      errorMsg.textContent = '';
      input.classList.remove('error');
    });

    // Enter key submits
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      const val = input.value.trim();

      if (!val) {
        showError('Kuch toh type karo jaan 😅');
        return;
      }

      if (val.toLowerCase() === SECRET_PASSWORD.toLowerCase()) {
        // ✅ CORRECT — show success ring then launch animation
        showSuccessRing();
        setTimeout(launchIntro, 600);
      } else {
        // ❌ WRONG
        input.classList.add('error');
        const wrongs = [
          'Galat password! Try again 😤',
          'Nahi nahi… soch ke dekho 🤔',
          'Hint: Jo mujhe sabse zyada pasand hai 💭',
          'Abhi bhi galat… 🙈',
        ];
        const count = parseInt(input.dataset.attempts || '0');
        input.dataset.attempts = count + 1;
        showError(wrongs[Math.min(count, wrongs.length - 1)]);
        input.value = '';
        // reset dots
        for (let i = 0; i < DOT_COUNT; i++) {
          document.getElementById(`dot-${i}`).classList.remove('filled');
        }
        setTimeout(() => input.classList.remove('error'), 500);
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
    }

    function toggleEye() {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      document.getElementById('eye-btn').textContent = isPassword ? '🙈' : '👁️';
    }

    function showSuccessRing() {
      const wrap = document.createElement('div');
      wrap.className = 'success-ring';
      const ring = document.createElement('div');
      ring.className = 'ring';
      wrap.appendChild(ring);
      document.body.appendChild(wrap);
      setTimeout(() => wrap.remove(), 700);
    }

    // ════════════════════════════════════════
    //  INTRO ANIMATION
    // ════════════════════════════════════════
    function launchIntro() {
      // hide password screen, show intro
      document.getElementById('password-screen').style.display = 'none';
      const intro = document.getElementById('intro-screen');
      intro.style.display = 'block';

      // typewriter
      const text    = "Loading something special for you ❤️";
      const speed   = 70;
      const el      = document.getElementById('typewriter');
      let   idx     = 0;

      function typeWriter() {
        if (idx < text.length) {
          el.textContent += text.charAt(idx);
          idx++;
          setTimeout(typeWriter, speed);
        }
      }
      typeWriter();

      // redirect after animation completes
      setTimeout(() => {
        window.location.href = "pages/envelope.html";
      }, 6500);
    }

    // ════════════════════════════════════════
    //  BOKEH BLOBS
    // ════════════════════════════════════════
    (function() {
      const cols = ['#ff8fab','#ffb3c6','#ff4d6d','#ffd6e0','#ffccd5'];
      for (let i = 0; i < 8; i++) {
        const b = document.createElement('div'); b.className = 'bk';
        const s = 80 + Math.random() * 280;
        b.style.cssText = `width:${s}px;height:${s}px;background:${cols[i%5]};`
          + `top:${Math.random()*100}%;left:${Math.random()*100}%;`
          + `animation-duration:${7+Math.random()*10}s;animation-delay:-${Math.random()*8}s;`
          + `opacity:${.1+Math.random()*.2};`;
        document.body.appendChild(b);
      }
    })();

    // ════════════════════════════════════════
    //  FALLING PETALS
    // ════════════════════════════════════════
    (function() {
      const em = ['🌸','🌺','🌹','💮','🌷','💗'];
      function mk() {
        const d = document.createElement('div'); d.className = 'pt';
        d.textContent = em[Math.floor(Math.random() * em.length)];
        d.style.left = Math.random() * 100 + 'vw';
        d.style.fontSize = (11 + Math.random() * 13) + 'px';
        const dur = 6 + Math.random() * 9;
        d.style.animationDuration = dur + 's';
        document.body.appendChild(d);
        setTimeout(() => { d.remove(); mk(); }, (dur + .5) * 1000);
      }
      for (let i = 0; i < 16; i++) setTimeout(mk, Math.random() * 7000);
    })();
  </script>

</body>
</html>
